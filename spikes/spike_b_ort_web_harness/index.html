<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Spike B — ORT-Web + WebGPU feasibility</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 820px;
    margin: 32px auto;
    padding: 0 20px;
    background: #0b0d10;
    color: #e9ecef;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color: #8a94a0; font-size: 13px; margin-bottom: 24px; }
  button {
    background: #4f6df5; border: 0; color: white;
    padding: 10px 16px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button + button { margin-left: 8px; }
  .row { display: flex; gap: 12px; align-items: center; margin: 14px 0; flex-wrap: wrap; }
  label { font-size: 13px; color: #b9c1cc; }
  input[type="text"], select {
    background: #1a1e24; border: 1px solid #2a2f38; color: #e9ecef;
    padding: 6px 10px; border-radius: 6px; font-size: 13px;
  }
  input[type="text"] { width: 420px; }
  #log {
    background: #11141a; border: 1px solid #2a2f38; border-radius: 8px;
    padding: 14px; margin-top: 18px; font-family: ui-monospace, monospace;
    font-size: 12px; line-height: 1.5; white-space: pre-wrap;
    max-height: 400px; overflow-y: auto;
  }
  .ok { color: #5fe089; }
  .warn { color: #f5b149; }
  .err { color: #ff5c5c; }
  audio { margin-top: 18px; width: 100%; }
  .capnote {
    background: #1a1e24; border: 1px solid #2a2f38; border-radius: 6px;
    padding: 10px 14px; font-size: 12px; color: #b9c1cc; margin-bottom: 14px;
  }
</style>
</head>
<body>
  <h1>Spike B — ORT-Web harness</h1>
  <div class="sub">Feasibility test for browser-native F5/ZipVoice inference via WebGPU.</div>

  <div class="capnote" id="caps">Detecting WebGPU…</div>

  <div class="row">
    <label>Model:
      <select id="model">
        <option value="f5_teacher_fp16.onnx">F5 teacher (FP16)</option>
        <option value="zipvoice_distill.onnx">ZipVoice-Distill</option>
      </select>
    </label>
    <label>EP:
      <select id="ep">
        <option value="webgpu">WebGPU</option>
        <option value="wasm">WASM (fallback)</option>
      </select>
    </label>
    <label>Steps:
      <input type="text" id="steps" value="4" style="width: 60px" />
    </label>
  </div>

  <div class="row">
    <label>Prompt:
      <input type="text" id="prompt" value="Hello world. The quick brown fox jumps over the lazy dog." />
    </label>
  </div>

  <div class="row">
    <button id="loadBtn">1. Load model</button>
    <button id="runBtn" disabled>2. Run inference</button>
    <button id="clearBtn">Clear log</button>
  </div>

  <div id="log">Ready. Click "Load model" to begin.</div>

  <audio id="out" controls></audio>

  <script type="module" src="./harness.js"></script>
</body>
</html>
